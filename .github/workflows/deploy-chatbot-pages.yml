name: Deploy Chatbot To Pages

on:
  push:
    branches: ["main"]
    paths:
      - "chatbot-colaboradores/**"
      - ".github/workflows/deploy-chatbot-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-chatbot
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm -r install --no-frozen-lockfile

      - name: Build chatbot app for Pages
        env:
          BASE_PATH: /portal-uix/
          VITE_API_BASE_URL: https://script.google.com/macros/s/AKfycbzBdx5IHMaqNjYcN5O6z9k1oH9sbOffc0Ik353LF613zmZ0bROUDQSJQUTp2JvZ6RHJoQ/exec
          VITE_REMINDER_API_BASE_URL: https://script.google.com/macros/s/AKfycbzBdx5IHMaqNjYcN5O6z9k1oH9sbOffc0Ik353LF613zmZ0bROUDQSJQUTp2JvZ6RHJoQ/exec
        run: pnpm --dir chatbot-colaboradores run build

      - name: Resolve build output path
        id: dist
        run: |
          DIST_INDEX_PATH="$(find . -type f -path "*/dist/index.html" | head -n 1)"
          if [ -z "$DIST_INDEX_PATH" ]; then
            echo "No dist/index.html found" >&2
            find . -maxdepth 4 -type d -name dist || true
            exit 1
          fi

          DIST_DIR="$(dirname "$DIST_INDEX_PATH")"
          DIST_DIR="${DIST_DIR#./}"
          echo "Resolved dist dir: $DIST_DIR"
          echo "dist_path=$DIST_DIR" >> "$GITHUB_OUTPUT"

      - name: Add SPA fallback
        run: cp "${{ steps.dist.outputs.dist_path }}/index.html" "${{ steps.dist.outputs.dist_path }}/404.html"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.dist.outputs.dist_path }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
