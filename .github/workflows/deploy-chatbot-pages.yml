name: Deploy Chatbot To Pages

on:
  push:
    branches: ["main"]
    paths:
      - "chatbot-colaboradores/**"
      - ".github/workflows/deploy-chatbot-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-chatbot
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm -r install --no-frozen-lockfile

      - name: Install chatbot dependencies
        run: pnpm install --filter @workspace/chatbot-colaboradores... --no-frozen-lockfile

      - name: Build chatbot app for Pages
        env:
          BASE_PATH: /portal-uix/
          VITE_REMINDER_API_BASE_URL: ${{ secrets.VITE_REMINDER_API_BASE_URL }}
        working-directory: chatbot-colaboradores
        run: pnpm build

      - name: Resolve build output path
        id: dist
        run: |
          if [ -f chatbot-colaboradores/dist/index.html ]; then
            echo "dist_path=chatbot-colaboradores/dist" >> "$GITHUB_OUTPUT"
          elif [ -f dist/index.html ]; then
            echo "dist_path=dist" >> "$GITHUB_OUTPUT"
          else
            echo "No dist/index.html found" >&2
            exit 1
          fi

      - name: Add SPA fallback
        run: cp "${{ steps.dist.outputs.dist_path }}/index.html" "${{ steps.dist.outputs.dist_path }}/404.html"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.dist.outputs.dist_path }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
